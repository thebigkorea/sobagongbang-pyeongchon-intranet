<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>소바공방 평촌점 직원정보 입력</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#f4f6f9;
  font-family:'Malgun Gothic',Arial,sans-serif;
  color:#222;
}

.header{
  background:linear-gradient(135deg,#2b1d12,#7c2d12);
  color:#fff;
  padding:28px 18px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
  box-shadow:0 5px 22px rgba(0,0,0,.18);
}

.header h1{
  margin:0;
  font-size:26px;
}

.header p{
  margin:8px 0 0;
  font-size:13px;
  opacity:.85;
}

.container{
  width:100%;
  max-width:820px;
  margin:0 auto;
  padding:18px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

h2{
  margin:0 0 16px;
  font-size:22px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

label{
  display:block;
  font-size:14px;
  font-weight:bold;
}

input,select,textarea{
  width:100%;
  margin-top:6px;
  border:1px solid #d7dce5;
  border-radius:13px;
  padding:13px;
  font-size:15px;
  background:#fff;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.full{
  grid-column:1/-1;
}

button{
  width:100%;
  border:none;
  border-radius:15px;
  padding:15px;
  margin-top:16px;
  background:#7c2d12;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.notice{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:13px;
  font-size:14px;
}

.notice.ok{
  display:block;
  background:#dcfce7;
  color:#166534;
}

.notice.err{
  display:block;
  background:#fee2e2;
  color:#991b1b;
}

.result-list{
  margin-top:12px;
  display:grid;
  gap:10px;
}

.result-item{
  padding:13px;
  border-radius:14px;
  border:1px solid #e5e7eb;
  background:#fafafa;
  cursor:pointer;
}

.result-item strong{
  font-size:16px;
}

.result-item p{
  margin:6px 0 0;
  font-size:13px;
  color:#666;
  line-height:1.5;
}

@media(max-width:760px){
  .form-grid{
    grid-template-columns:1fr;
  }

  .header h1{
    font-size:23px;
  }
}
</style>
</head>

<body>

<header class="header">
  <h1>소바공방 평촌점 직원정보 입력</h1>
  <p>직원 기본정보를 평촌 직원정보 시트에 저장합니다.</p>
</header>

<main class="container">

  <section class="card">
    <h2>기존 직원 검색</h2>

    <label>
      성함 또는 전화번호
      <input id="keyword" type="text" placeholder="예: 홍길동 또는 01012345678">
    </label>

    <button onclick="searchEmployee()">검색하기</button>

    <div id="searchNotice" class="notice"></div>
    <div id="resultList" class="result-list"></div>
  </section>

  <section class="card">
    <h2>직원정보 입력</h2>

    <div class="form-grid">

      <label>
        매장명
        <input id="store" type="text" value="소바공방 평촌점" readonly>
      </label>

      <label>
        직원명
        <input id="name" type="text" placeholder="직원명">
      </label>

      <label>
        휴대폰
        <input id="phone" type="tel" placeholder="010-0000-0000">
      </label>

      <label>
        주민번호
        <input id="rrn" type="text" placeholder="000000-0000000">
      </label>

      <label>
        생년월일
        <input id="birth" type="date">
      </label>

      <label>
        입사일
        <input id="joinDate" type="date">
      </label>

      <label>
        퇴사일
        <input id="leaveDate" type="date">
      </label>

      <label>
        직급
        <select id="position">
          <option value="">선택</option>
          <option>점장</option>
          <option>매니저</option>
          <option>직원</option>
          <option>파트타이머</option>
          <option>일용직</option>
        </select>
      </label>

      <label>
        고용형태
        <select id="employmentType">
          <option value="">선택</option>
          <option>정규직</option>
          <option>계약직</option>
          <option>아르바이트</option>
          <option>일용직</option>
          <option>사업소득자</option>
        </select>
      </label>

      <label>
        급여형태
        <select id="salaryType">
          <option value="">선택</option>
          <option>월급</option>
          <option>시급</option>
          <option>일급</option>
          <option>사업소득</option>
        </select>
      </label>

      <label>
        시급
        <input id="hourlyPay" type="number" placeholder="예: 10030">
      </label>

      <label>
        월급
        <input id="monthlyPay" type="number" placeholder="예: 2500000">
      </label>

      <label>
        부서
        <select id="department">
          <option value="">선택</option>
          <option>홀</option>
          <option>주방</option>
          <option>설거지</option>
          <option>전처리</option>
          <option>관리</option>
        </select>
      </label>

      <label>
        상태
        <select id="status">
          <option>재직</option>
          <option>퇴사</option>
          <option>휴직</option>
        </select>
      </label>

      <label>
        은행명
        <input id="bank" type="text" placeholder="예: 국민은행">
      </label>

      <label>
        계좌번호
        <input id="account" type="text" placeholder="계좌번호">
      </label>

      <label class="full">
        주소
        <input id="address" type="text" placeholder="주소">
      </label>

      <label class="full">
        비고
        <textarea id="memo" placeholder="특이사항"></textarea>
      </label>

    </div>

    <button id="saveBtn" onclick="saveEmployee()">직원정보 저장</button>

    <div id="saveNotice" class="notice"></div>
  </section>

</main>

<script>
const API_URL =
  "https://script.google.com/macros/s/AKfycbx6g5ZsRuTOTVkSDDvDmoG66kaUZ32ff6OLg5tuTEZCL9vw_99DoiJkaOnAXadPOeydsg/exec";

function val(id){
  return document.getElementById(id).value.trim();
}

function showNotice(id,type,msg){
  const el = document.getElementById(id);
  el.className = "notice " + type;
  el.textContent = msg;
}

function clearNotice(id){
  const el = document.getElementById(id);
  el.className = "notice";
  el.textContent = "";
}

async function searchEmployee(){
  const keyword = val("keyword");
  const box = document.getElementById("resultList");
  box.innerHTML = "";
  clearNotice("searchNotice");

  if(!keyword){
    showNotice("searchNotice","err","성함 또는 전화번호를 입력해주세요.");
    return;
  }

  try{
    const res = await fetch(
      API_URL + "?action=searchEmployee&keyword=" + encodeURIComponent(keyword)
    );

    const json = await res.json();
    const list = json.data || [];

    if(list.length === 0){
      showNotice("searchNotice","err","검색 결과가 없습니다. 새로 입력하세요.");
      document.getElementById("name").value = keyword;
      return;
    }

    showNotice("searchNotice","ok",list.length + "건을 찾았습니다.");

    box.innerHTML = list.map(item => `
      <div class="result-item" onclick='fillEmployee(${JSON.stringify(item)})'>
        <strong>${item.name || ""}</strong>
        <p>
          휴대폰: ${item.phone || "-"}<br>
          직급: ${item.position || "-"}<br>
          주소: ${item.address || "-"}
        </p>
      </div>
    `).join("");

  }catch(e){
    showNotice("searchNotice","err","검색 중 오류가 발생했습니다.");
  }
}

function fillEmployee(item){
  document.getElementById("name").value = item.name || "";
  document.getElementById("phone").value = item.phone || "";
  document.getElementById("rrn").value = item.rrn || "";
  document.getElementById("birth").value = item.birth || "";
  document.getElementById("address").value = item.address || "";
  document.getElementById("bank").value = item.bank || "";
  document.getElementById("account").value = item.account || "";
  document.getElementById("position").value = item.position || "";

  document.getElementById("resultList").innerHTML = "";
  showNotice("searchNotice","ok","기존 정보를 불러왔습니다.");
}

async function saveEmployee(){
  clearNotice("saveNotice");

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "저장 중...";

  const data = {
    action:"saveEmployee",
    store:val("store"),
    name:val("name"),
    phone:val("phone"),
    rrn:val("rrn"),
    birth:val("birth"),
    address:val("address"),
    bank:val("bank"),
    account:val("account"),
    joinDate:val("joinDate"),
    leaveDate:val("leaveDate"),
    position:val("position"),
    employmentType:val("employmentType"),
    salaryType:val("salaryType"),
    hourlyPay:val("hourlyPay"),
    monthlyPay:val("monthlyPay"),
    department:val("department"),
    status:val("status"),
    memo:val("memo")
  };

  if(!data.name){
    showNotice("saveNotice","err","직원명을 입력해주세요.");
    resetButton();
    return;
  }

  if(!data.phone){
    showNotice("saveNotice","err","휴대폰 번호를 입력해주세요.");
    resetButton();
    return;
  }

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify(data)
    });

    const json = await res.json();

    if(json.success){
      showNotice("saveNotice","ok",json.message || "저장되었습니다.");
      clearForm();
    }else{
      showNotice("saveNotice","err",json.message || "저장 실패");
    }

  }catch(e){
    showNotice("saveNotice","err","저장 중 오류가 발생했습니다.");
  }

  resetButton();
}

function resetButton(){
  const btn = document.getElementById("saveBtn");
  btn.disabled = false;
  btn.textContent = "직원정보 저장";
}

function clearForm(){
  document.getElementById("keyword").value = "";
  document.getElementById("resultList").innerHTML = "";

  [
    "name","phone","rrn","birth","address","bank","account",
    "joinDate","leaveDate","hourlyPay","monthlyPay","memo"
  ].forEach(id => {
    document.getElementById(id).value = "";
  });

  document.getElementById("position").value = "";
  document.getElementById("employmentType").value = "";
  document.getElementById("salaryType").value = "";
  document.getElementById("department").value = "";
  document.getElementById("status").value = "재직";
}
</script>

</body>
</html>
